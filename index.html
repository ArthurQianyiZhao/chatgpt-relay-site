<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ChatGPT 提问中转站</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #182033;
      --muted: #667085;
      --border: #d8dce7;
      --primary: #1f6feb;
      --primary-dark: #1859bf;
      --error: #b42318;
      --answer-bg: #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(31,111,235,.10), transparent 28rem),
        radial-gradient(circle at 85% 5%, rgba(39,174,96,.10), transparent 24rem),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(216,220,231,.9);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(22, 34, 51, .12);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    header {
      padding: 28px 28px 18px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    main { padding: 28px; }

    label {
      display: block;
      font-weight: 700;
      margin: 0 0 10px;
    }

    textarea, input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      background: #fff;
      outline: none;
      transition: border .15s, box-shadow .15s;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.6;
    }

    textarea:focus, input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(31,111,235,.12);
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .access-code-wrap {
      margin-top: 16px;
      display: none;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: var(--primary);
      transition: background .15s, transform .15s;
    }

    button:hover { background: var(--primary-dark); }
    button:active { transform: translateY(1px); }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .ghost:hover { background: #f2f4f7; }

    .status {
      color: var(--muted);
      min-height: 24px;
    }

    .answer {
      margin-top: 24px;
      padding: 18px;
      background: var(--answer-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      white-space: pre-wrap;
      line-height: 1.7;
      min-height: 120px;
    }

    .error { color: var(--error); }

    footer {
      padding: 16px 28px 24px;
      color: var(--muted);
      font-size: 13px;
    }

    code {
      background: rgba(27,31,36,.06);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>ChatGPT 提问中转站</h1>
      <p class="subtitle">输入问题，提交后会通过你配置的后端代理调用 OpenAI API，并把回答显示在这里。</p>
    </header>

    <main>
      <div class="grid">
        <div>
          <label for="question">你的问题</label>
          <textarea id="question" placeholder="例如：请用三句话解释量子计算是什么。"></textarea>
        </div>

        <div id="accessCodeWrap" class="access-code-wrap">
          <label for="accessCode">访问码</label>
          <input id="accessCode" type="password" placeholder="输入访问码" autocomplete="off" />
        </div>
      </div>

      <div class="actions">
        <button id="askBtn">提交问题</button>
        <button id="clearBtn" class="ghost" type="button">清空</button>
        <span id="status" class="status"></span>
      </div>

      <section id="answer" class="answer">回答会显示在这里。</section>
    </main>

    <footer>
      部署前请修改脚本里的 <code>API_URL</code> 为你的 Cloudflare Worker 地址。不要把 OpenAI API key 写进这个 HTML。
    </footer>
  </div>

  <script>
    // 1) 部署 worker.js 后，把下面替换成你的 Worker 地址：
    //    例如：https://chatgpt-relay.yourname.workers.dev/ask
    const API_URL = "https://chatgpt-relay-site.arthurqzhao.workers.dev/ask";

    // 2) 如果 Worker 配置了 ACCESS_CODE，这里改成 true，页面会显示访问码输入框。
    //    注意：这只是降低滥用的简单门槛，不是强安全认证。
    const REQUIRE_ACCESS_CODE = true;

    const questionEl = document.getElementById("question");
    const accessCodeEl = document.getElementById("accessCode");
    const accessCodeWrap = document.getElementById("accessCodeWrap");
    const askBtn = document.getElementById("askBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const answerEl = document.getElementById("answer");

    if (REQUIRE_ACCESS_CODE) {
      accessCodeWrap.style.display = "block";
    }

    function setBusy(isBusy) {
      askBtn.disabled = isBusy;
      askBtn.textContent = isBusy ? "正在生成..." : "提交问题";
    }

    function showError(message) {
      statusEl.textContent = "请求失败";
      answerEl.innerHTML = "";
      const div = document.createElement("div");
      div.className = "error";
      div.textContent = message;
      answerEl.appendChild(div);
    }

    async function ask() {
      const question = questionEl.value.trim();
      const accessCode = accessCodeEl.value.trim();

      if (!question) {
        showError("请先输入问题。");
        return;
      }

      if (!API_URL.includes("workers.dev") || API_URL.includes("YOUR-WORKER-SUBDOMAIN")) {
        showError("请先在 index.html 里把 API_URL 改成你的 Worker 地址。");
        return;
      }

      setBusy(true);
      statusEl.textContent = "正在请求...";
      answerEl.textContent = "";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...(accessCode ? { "x-access-code": accessCode } : {})
          },
          body: JSON.stringify({ question })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || `HTTP ${res.status}`);
        }

        answerEl.textContent = data.answer || "没有返回内容。";
        statusEl.textContent = "完成";
      } catch (err) {
        showError(err.message || "未知错误");
      } finally {
        setBusy(false);
      }
    }

    askBtn.addEventListener("click", ask);
    clearBtn.addEventListener("click", () => {
      questionEl.value = "";
      answerEl.textContent = "回答会显示在这里。";
      statusEl.textContent = "";
      questionEl.focus();
    });

    questionEl.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        ask();
      }
    });
  </script>
</body>
</html>
