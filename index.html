<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ChatGPT 会话中转站</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #182033;
      --muted: #667085;
      --border: #d8dce7;
      --primary: #1f6feb;
      --primary-dark: #1859bf;
      --error: #b42318;
      --user: #1f6feb;
      --assistant: #f3f4f6;
      --shadow: 0 24px 80px rgba(22, 34, 51, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(31,111,235,.12), transparent 28rem),
        radial-gradient(circle at 88% 6%, rgba(39,174,96,.10), transparent 24rem),
        var(--bg);
      padding: 24px;
    }

    .app {
      width: min(980px, 100%);
      min-height: calc(100vh - 48px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(216,220,231,.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    header {
      padding: 24px 28px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    main {
      padding: 24px 28px;
      overflow: auto;
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 320px;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 20px;
      padding: 28px;
      color: var(--muted);
      line-height: 1.7;
      background: rgba(248,250,252,.8);
    }

    .message {
      max-width: 84%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant);
      color: var(--text);
      border-bottom-left-radius: 6px;
    }

    .message.error {
      align-self: flex-start;
      background: #fff1f0;
      color: var(--error);
      border: 1px solid #ffccc7;
    }

    .message-meta {
      display: block;
      font-size: 12px;
      opacity: .72;
      margin-bottom: 4px;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 18px 28px 24px;
      background: rgba(255,255,255,.95);
    }

    label {
      display: block;
      font-weight: 700;
      margin: 0 0 8px;
    }

    textarea, input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      background: #fff;
      outline: none;
      transition: border .15s, box-shadow .15s;
    }

    textarea {
      min-height: 112px;
      max-height: 260px;
      resize: vertical;
      line-height: 1.6;
    }

    textarea:focus, input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(31,111,235,.12);
    }

    .access-code-wrap {
      display: none;
      margin-top: 12px;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: var(--primary);
      transition: background .15s, transform .15s, opacity .15s;
    }

    button:hover { background: var(--primary-dark); }
    button:active { transform: translateY(1px); }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .ghost:hover { background: #f2f4f7; }

    .danger {
      background: transparent;
      color: var(--error);
      border: 1px solid #ffccc7;
    }

    .danger:hover { background: #fff1f0; }

    .status {
      color: var(--muted);
      min-height: 24px;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    code {
      background: rgba(27,31,36,.06);
      padding: 2px 6px;
      border-radius: 6px;
    }

    @media (max-width: 640px) {
      body { padding: 10px; }
      .app { min-height: calc(100vh - 20px); border-radius: 18px; }
      header, main, .composer { padding-left: 16px; padding-right: 16px; }
      .message { max-width: 94%; }
      button { width: 100%; }
      .header-actions, .actions { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>ChatGPT 会话中转站</h1>
        <p class="subtitle">
          本页面会在当前浏览器 session 中保留上下文。刷新页面后仍在；关闭这个标签页后通常会清空。
        </p>
      </div>
      <div class="header-actions">
        <button id="exportBtn" class="ghost" type="button">导出记录</button>
        <button id="newSessionBtn" class="danger" type="button">新会话</button>
      </div>
    </header>

    <main>
      <section id="chat" class="chat"></section>
    </main>

    <section class="composer">
      <label for="question">输入你的问题</label>
      <textarea id="question" placeholder="继续追问时，会自动带上本 session 的历史上下文。按 Ctrl/⌘ + Enter 发送。"></textarea>

      <div id="accessCodeWrap" class="access-code-wrap">
        <label for="accessCode">访问码</label>
        <input id="accessCode" type="password" placeholder="输入访问码" autocomplete="off" />
      </div>

      <div class="actions">
        <button id="askBtn">发送</button>
        <button id="clearInputBtn" class="ghost" type="button">清空输入</button>
        <span id="status" class="status"></span>
      </div>

      <div class="hint">
        部署前请把脚本里的 <code>API_URL</code> 改为你的 Worker 地址。不要把 OpenAI API key 写进这个 HTML。
      </div>
    </section>
  </div>

  <script>
    /**
     * 1) 部署 worker.js 后，把下面替换成你的 Worker 地址：
     *    例如：https://chatgpt-relay.yourname.workers.dev/ask
     */
    const API_URL = "https://chatgpt-relay-site.arthurqzhao.workers.dev/ask";

    /**
     * 2) 如果 Worker 设置了 ACCESS_CODE，这里改成 true。
     *    页面会显示访问码输入框，请求时会通过 x-access-code 发送给 Worker。
     */
    const REQUIRE_ACCESS_CODE = true;

    /**
     * 3) 本地 session 记忆设置。
     *    sessionStorage：同一个标签页内保存；关闭标签页后通常清空。
     *    MAX_LOCAL_MESSAGES：前端最多保存多少条消息。
     */
    const SESSION_KEY = "chatgpt-relay-session-messages-v1";
    const MAX_LOCAL_MESSAGES = 40;

    const chatEl = document.getElementById("chat");
    const questionEl = document.getElementById("question");
    const accessCodeEl = document.getElementById("accessCode");
    const accessCodeWrap = document.getElementById("accessCodeWrap");
    const askBtn = document.getElementById("askBtn");
    const clearInputBtn = document.getElementById("clearInputBtn");
    const newSessionBtn = document.getElementById("newSessionBtn");
    const exportBtn = document.getElementById("exportBtn");
    const statusEl = document.getElementById("status");

    if (REQUIRE_ACCESS_CODE) {
      accessCodeWrap.style.display = "block";
    }

    let messages = loadMessages();

    renderChat();

    function loadMessages() {
      try {
        const parsed = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "[]");
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(isValidClientMessage).slice(-MAX_LOCAL_MESSAGES);
      } catch {
        return [];
      }
    }

    function isValidClientMessage(message) {
      return (
        message &&
        ["user", "assistant"].includes(message.role) &&
        typeof message.content === "string" &&
        message.content.trim()
      );
    }

    function saveMessages() {
      messages = messages.filter(isValidClientMessage).slice(-MAX_LOCAL_MESSAGES);
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(messages));
    }

    function renderChat() {
      chatEl.innerHTML = "";

      if (!messages.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "还没有消息。输入一个问题开始聊天；之后的追问会自动携带本 session 中的上下文。";
        chatEl.appendChild(empty);
        return;
      }

      for (const message of messages) {
        appendMessage(message.role, message.content, false);
      }

      scrollToBottom();
    }

    function appendMessage(role, content, shouldScroll = true) {
      const bubble = document.createElement("div");
      bubble.className = `message ${role}`;

      const meta = document.createElement("span");
      meta.className = "message-meta";
      meta.textContent = role === "user" ? "你" : "助手";

      const body = document.createElement("span");
      body.textContent = content;

      bubble.appendChild(meta);
      bubble.appendChild(body);
      chatEl.appendChild(bubble);

      if (shouldScroll) scrollToBottom();
    }

    function appendError(content) {
      const bubble = document.createElement("div");
      bubble.className = "message error";
      bubble.textContent = content;
      chatEl.appendChild(bubble);
      scrollToBottom();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatEl.parentElement.scrollTop = chatEl.parentElement.scrollHeight;
      });
    }

    function setBusy(isBusy) {
      askBtn.disabled = isBusy;
      askBtn.textContent = isBusy ? "正在生成..." : "发送";
    }

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    async function ask() {
      const question = questionEl.value.trim();
      const accessCode = accessCodeEl.value.trim();

      if (!question) {
        appendError("请先输入问题。");
        return;
      }

      if (!API_URL.includes("/ask") || API_URL.includes("YOUR-WORKER-SUBDOMAIN")) {
        appendError("请先在 index.html 里把 API_URL 改成你的 Worker /ask 地址。");
        return;
      }

      const userMessage = { role: "user", content: question };
      messages.push(userMessage);
      saveMessages();

      if (chatEl.querySelector(".empty")) chatEl.innerHTML = "";
      appendMessage("user", question);

      questionEl.value = "";
      setBusy(true);
      setStatus("正在请求...");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...(accessCode ? { "x-access-code": accessCode } : {})
          },
          body: JSON.stringify({
            messages: messages.slice(-MAX_LOCAL_MESSAGES)
          })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || `HTTP ${res.status}`);
        }

        const answer = data.answer || "没有返回内容。";
        messages.push({ role: "assistant", content: answer });
        saveMessages();

        appendMessage("assistant", answer);
        setStatus("完成");
      } catch (err) {
        messages = messages.filter(m => m !== userMessage);
        saveMessages();
        appendError(err.message || "请求失败");
        setStatus("请求失败");
      } finally {
        setBusy(false);
        questionEl.focus();
      }
    }

    function newSession() {
      const ok = confirm("确定要清空当前 session 的上下文吗？");
      if (!ok) return;

      messages = [];
      sessionStorage.removeItem(SESSION_KEY);
      renderChat();
      setStatus("已开启新会话");
      questionEl.focus();
    }

    function exportTranscript() {
      if (!messages.length) {
        appendError("当前没有可导出的聊天记录。");
        return;
      }

      const content = messages.map(message => {
        const speaker = message.role === "user" ? "你" : "助手";
        return `## ${speaker}\n\n${message.content}`;
      }).join("\n\n---\n\n");

      const blob = new Blob([content], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `chat-transcript-${date}.md`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    askBtn.addEventListener("click", ask);
    clearInputBtn.addEventListener("click", () => {
      questionEl.value = "";
      questionEl.focus();
    });
    newSessionBtn.addEventListener("click", newSession);
    exportBtn.addEventListener("click", exportTranscript);

    questionEl.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        ask();
      }
    });
  </script>
</body>
</html>
